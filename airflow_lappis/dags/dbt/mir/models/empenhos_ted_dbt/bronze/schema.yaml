version: 2

models:
  - name: empenhos_tesouro_ted
    description: >
      Tabela da camada bronze contendo informações detalhadas sobre os empenhos do Tesouro Gerencial 
      vinculados a emendas parlamentares e TEDs. 
      A tabela realiza a limpeza do número do processo, padronização de nomes de favorecidos 
      e conversão de valores financeiros de string para numeric(15,2) via macro.
    meta:
      tags:
        - bronze
    columns:
      - name: programa_governo
        description: >
          Código identificador do programa de governo associado ao empenho.
      - name: programa_governo_descricao
        description: >
          Descrição textual do programa de governo.
      - name: acao_governo
        description: >
          Código da ação orçamentária (Ação de Governo).
      - name: acao_governo_descricao
        description: >
          Descrição da ação orçamentária.
      - name: emissao_mes
        description: >
          Mês de emissão da nota de empenho.
      - name: emissao_dia
        description: >
          Dia específico da emissão da nota de empenho.
      - name: ne_ccor
        description: >
          Número completo da nota de empenho (Chave natural principal).
      - name: ne_num_processo
        description: >
          Número do processo administrativo, limpo de caracteres especiais (pontos, barras, hifens) via regex.
      - name: ne_info_complementar
        description: >
          Informações adicionais registradas na nota de empenho.
      - name: ne_ccor_descricao
        description: >
          Descrição detalhada do item ou serviço empenhado.
      - name: doc_observacao
        description: >
          Observações registradas no documento fiscal ou contábil.
      - name: natureza_despesa
        description: >
          Código da natureza da despesa (ex: 339030).
      - name: natureza_despesa_descricao
        description: >
          Descrição da categoria da natureza de despesa.
      - name: ne_ccor_favorecido
        description: >
          CNPJ ou CPF do favorecido do empenho, convertido para caixa alta.
      - name: ne_ccor_favorecido_descricao
        description: >
          Nome ou Razão Social do favorecido.
      - name: ne_ccor_ano_emissao
        description: >
          Ano de emissão do empenho (YYYY), validado via regex para garantir 4 dígitos numéricos.
      - name: ptres
        description: >
          Programa de Trabalho Resumido (PTRES).
      - name: fonte_recursos_detalhada
        description: >
          Código detalhado da fonte de financiamento.
      - name: fonte_recursos_detalhada_descricao
        description: >
          Descrição da fonte de recursos.
      - name: despesas_empenhadas
        description: >
          Valor total das despesas empenhadas, convertido para numeric(15,2).
      - name: despesas_liquidadas
        description: >
          Valor das despesas que já passaram pela liquidação, convertido para numeric(15,2).
      - name: despesas_pagas
        description: >
          Valor efetivamente pago ao favorecido, convertido para numeric(15,2).
      - name: restos_a_pagar_inscritos
        description: >
          Valor inscrito em Restos a Pagar (RP), convertido para numeric(15,2).
      - name: restos_a_pagar_pagos
        description: >
          Valor de Restos a Pagar que já foram quitados, convertido para numeric(15,2).
      - name: dt_ingest
        description: >
          Timestamp da ingestão dos dados na camada raw, ajustado para o fuso horário de Brasília (UTC-3).

    tests:
      - verificacao_tipagem:
          nome_tabela: 'mir.empenhos_tesouro_parlamentares'
          nome_coluna: 'ne_ccor_ano_emissao'
          tipo_esperado: 'integer'
      - verificacao_tipagem:
          nome_tabela: 'mir.empenhos_tesouro_parlamentares'
          nome_coluna: 'despesas_empenhadas'
          tipo_esperado: 'numeric'
      - verificacao_tipagem:
          nome_tabela: 'mir.empenhos_tesouro_parlamentares'
          nome_coluna: 'restos_a_pagar_inscritos'
          tipo_esperado: 'numeric'

  - name: nc_tesouro_mir
    description: >
      Modelo da camada bronze que consolida os dados brutos de Notas de Crédito do Tesouro Gerencial (SIAFI), 
      abrangendo os períodos anteriores e posteriores a 2026. 
      Realiza a unificação (UNION ALL) das bases históricas e atuais, preenchendo com valores nulos 
      (ou zero para campos financeiros) as colunas inexistentes em cada tabela original para garantir a integridade do schema. 
      Também aplica o casamento semântico entre colunas equivalentes de 2025 e 2026
      (ex.: evento/tipo_nc, UG responsável/emitente, natureza/GND, plano interno/descrição),
      mantendo um layout único para consumo nas camadas seguintes.
    meta:
      tags:
        - bronze
    columns:
      - name: programa_governo
        description: "Somente pré-2026. Código identificador do programa de governo."
      - name: programa_governo_descricao
        description: "Somente pré-2026. Descrição detalhada do programa de governo."
      - name: acao_governo
        description: "Somente pré-2026. Código da ação orçamentária."
      - name: acao_governo_descricao
        description: "Somente pré-2026. Descrição da ação orçamentária."
      - name: nc
        description: "Comum (pré e pós-2026). Número identificador da Nota de Crédito (NC)."
      - name: nc_transferencia
        description: "Comum (pré e pós-2026). Número/identificador de transferência associado à NC."
      - name: nc_fonte_recursos
        description: "Comum (pré e pós-2026). Código da fonte de recursos (na pós-2026 vem de fonte_codigo)."
      - name: nc_fonte_recursos_descricao
        description: "Comum (pré e pós-2026). Descrição da fonte de recursos (na pós-2026 vem de fonte_nome)."
      - name: ptres
        description: "Comum (pré e pós-2026). Programa de Trabalho Resumido (PTRES)."
      - name: nc_evento_descricao
        description: "Comum (pré e pós-2026). NC - Evento Desc (na pós-2026 mapeado a partir de tipo_nc)."
      - name: nc_ug_responsavel
        description: "Comum (pré e pós-2026). NC - UG Responsável (na pós-2026 mapeado a partir de emitente_codigo)."
      - name: nc_ug_responsavel_descricao
        description: "Comum (pré e pós-2026). NC - UG Responsável Descrição (na pós-2026 mapeado a partir de emitente_nome)."
      - name: nc_natureza_despesa
        description: "Comum (pré e pós-2026). NC - Natureza Despesa (na pós-2026 mapeado a partir de gnd_codigo)."
      - name: nc_natureza_despesa_descricao
        description: "Comum (pré e pós-2026). NC - Natureza Despesa Descrição (na pós-2026 mapeado a partir de gnd_nome)."
      - name: nc_plano_interno
        description: "Comum (pré e pós-2026). NC - Plano Interno (na pós-2026 mapeado a partir de pi_codigo)."
      - name: nc_plano_interno_descricao1
        description: "Comum (pré e pós-2026). NC - Plano Interno Descrição 1 (na pós-2026 mapeado a partir de pi_nome)."
      - name: favorecido_doc
        description: "Comum (pré e pós-2026). Favorecido Doc (na pós-2026 mapeado a partir de favorecido_codigo)."
      - name: favorecido_doc_descricao
        description: "Comum (pré e pós-2026). Favorecido Doc Desc (na pós-2026 mapeado a partir de favorecido_nome)."
      - name: favorecido_municipio
        description: "Somente pré-2026. Código do município do favorecido."
      - name: favorecido_municipio_descricao
        description: "Somente pré-2026. Nome do município do favorecido."
      - name: valor_celula
        description: "Comum (pré e pós-2026). Valor financeiro (na pré-2026 vem de nc_valor_linha; na pós-2026 vem de valor_celula)."
      - name: movimento_liquido_moeda_origem
        description: "Comum (pré e pós-2026). Movimento líquido (na pré-2026 vem de movimento_liquido_moeda_origem; na pós-2026 mapeado a partir de total_lista)."
      - name: dt_ingest
        description: "Comum (pré e pós-2026). Timestamp da ingestão (UTC-3)."
      - name: descricao
        description: "Somente pós-2026. Descrição geral da NC (campo descricao)."
      - name: nc_plano_interno_descricao2
        description: "Somente pré-2026. NC - Plano Interno Descrição 2."
      - name: nc_evento
        description: "Somente pré-2026. NC - Evento (sem match na base pós-2026)."
      - name: nc_item_detalhamento
        description: "Somente pós-2026. NC Item - Detalhamento (S/N) (sem match na base pré-2026)."
      - name: emissao_dia
        description: "Somente pós-2026. Dia da emissão da NC."
      - name: emissao_mes
        description: "Somente pós-2026. Mês da emissão da NC."
      - name: emissao_ano
        description: "Somente pós-2026. Ano da emissão da NC."
      - name: ro
        description: "Somente pós-2026. Registro de Operação associado."
      - name: dc
        description: "Somente pós-2026. Indicador de Débito ou Crédito (D/C)."
      - name: total_lista
        description: "Somente pós-2026. Valor total da lista de itens."
      - name: esfera_orcamentaria_codigo
        description: "Somente pós-2026. Código da esfera orçamentária."
      - name: esfera_orcamentaria_nome
        description: "Somente pós-2026. Nome da esfera orçamentária."

    tests:
      - verificacao_tipagem:
          nome_tabela: 'siafi_dbt.nc_tesouro_mir'
          nome_coluna: 'ptres'
          tipo_esperado: 'text'
      - verificacao_tipagem:
          nome_tabela: 'siafi_dbt.nc_tesouro_mir'
          nome_coluna: 'valor_celula'
          tipo_esperado: 'numeric'
      - verificacao_tipagem:
          nome_tabela: 'siafi_dbt.nc_tesouro_mir'
          nome_coluna: 'movimento_liquido_moeda_origem'
          tipo_esperado: 'numeric'
      - verificacao_tipagem:
          nome_tabela: 'siafi_dbt.nc_tesouro_mir'
          nome_coluna: 'emissao_dia'
          tipo_esperado: 'date'

