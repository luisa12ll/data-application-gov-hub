version: 2

models:
  - name: empenhos_tesouro_ted
    description: >
      Tabela da camada bronze contendo informações detalhadas sobre os empenhos do Tesouro Gerencial 
      vinculados a emendas parlamentares e TEDs. 
      A tabela realiza a limpeza do número do processo, padronização de nomes de favorecidos 
      e conversão de valores financeiros de string para numeric(15,2) via macro.
    meta:
      tags:
        - bronze
    columns:
      - name: programa_governo
        description: >
          Código identificador do programa de governo associado ao empenho.
      - name: programa_governo_descricao
        description: >
          Descrição textual do programa de governo.
      - name: acao_governo
        description: >
          Código da ação orçamentária (Ação de Governo).
      - name: acao_governo_descricao
        description: >
          Descrição da ação orçamentária.
      - name: emissao_mes
        description: >
          Mês de emissão da nota de empenho.
      - name: emissao_dia
        description: >
          Dia específico da emissão da nota de empenho.
      - name: ne_ccor
        description: >
          Número completo da nota de empenho (Chave natural principal).
      - name: ne_num_processo
        description: >
          Número do processo administrativo, limpo de caracteres especiais (pontos, barras, hifens) via regex.
      - name: ne_info_complementar
        description: >
          Informações adicionais registradas na nota de empenho.
      - name: ne_ccor_descricao
        description: >
          Descrição detalhada do item ou serviço empenhado.
      - name: doc_observacao
        description: >
          Observações registradas no documento fiscal ou contábil.
      - name: natureza_despesa
        description: >
          Código da natureza da despesa (ex: 339030).
      - name: natureza_despesa_descricao
        description: >
          Descrição da categoria da natureza de despesa.
      - name: ne_ccor_favorecido
        description: >
          CNPJ ou CPF do favorecido do empenho, convertido para caixa alta.
      - name: ne_ccor_favorecido_descricao
        description: >
          Nome ou Razão Social do favorecido.
      - name: ne_ccor_ano_emissao
        description: >
          Ano de emissão do empenho (YYYY), validado via regex para garantir 4 dígitos numéricos.
      - name: ptres
        description: >
          Programa de Trabalho Resumido (PTRES).
      - name: fonte_recursos_detalhada
        description: >
          Código detalhado da fonte de financiamento.
      - name: fonte_recursos_detalhada_descricao
        description: >
          Descrição da fonte de recursos.
      - name: despesas_empenhadas
        description: >
          Valor total das despesas empenhadas, convertido para numeric(15,2).
      - name: despesas_liquidadas
        description: >
          Valor das despesas que já passaram pela liquidação, convertido para numeric(15,2).
      - name: despesas_pagas
        description: >
          Valor efetivamente pago ao favorecido, convertido para numeric(15,2).
      - name: restos_a_pagar_inscritos
        description: >
          Valor inscrito em Restos a Pagar (RP), convertido para numeric(15,2).
      - name: restos_a_pagar_pagos
        description: >
          Valor de Restos a Pagar que já foram quitados, convertido para numeric(15,2).
      - name: dt_ingest
        description: >
          Timestamp da ingestão dos dados na camada raw, ajustado para o fuso horário de Brasília (UTC-3).

    tests:
      - verificacao_tipagem:
          nome_tabela: 'mir.empenhos_tesouro_parlamentares'
          nome_coluna: 'ne_ccor_ano_emissao'
          tipo_esperado: 'integer'
      - verificacao_tipagem:
          nome_tabela: 'mir.empenhos_tesouro_parlamentares'
          nome_coluna: 'despesas_empenhadas'
          tipo_esperado: 'numeric'
      - verificacao_tipagem:
          nome_tabela: 'mir.empenhos_tesouro_parlamentares'
          nome_coluna: 'restos_a_pagar_inscritos'
          tipo_esperado: 'numeric'

  - name: nc_tesouro_mir
    description: >
      Modelo da camada bronze que consolida os dados brutos de Notas de Crédito do Tesouro Gerencial (SIAFI), 
      abrangendo os períodos anteriores e posteriores a 2026. 
      Realiza a unificação (UNION ALL) das bases históricas e atuais, preenchendo com valores nulos 
      (ou zero para campos financeiros) as colunas inexistentes em cada tabela original para garantir a integridade do schema. 
      O processamento inclui:
        - Casting de tipos para texto e numérico;
        - Limpeza de caracteres especiais em números de processo via Regex;
        - Padronização de nomes de favorecidos para caixa alta;
        - Conversão de valores financeiros para **numeric(15,2)** via macro;
        - Filtro de segurança para processar apenas anos de emissão válidos (4 dígitos).
    meta:
      tags:
        - bronze
    columns:
      - name: nc
        description: "Número identificador da Nota de Crédito (NC)."
      - name: ptres
        description: "Programa de Trabalho Resumido (PTRES)."
      - name: nc_transferencia
        description: "Informações sobre transferência da Nota de Crédito."
      - name: ugr_codigo
        description: "Código da Unidade Gestora Responsável."
      - name: ugr_nome
        description: "Nome da Unidade Gestora Responsável."
      - name: fonte_codigo
        description: "Código da fonte de recursos."
      - name: fonte_nome
        description: "Descrição da fonte de recursos."
      - name: pi_codigo
        description: "Código do Plano Interno."
      - name: pi_nome
        description: "Descrição do Plano Interno."
      - name: favorecido_codigo
        description: "Identificador (CPF/CNPJ) do favorecido."
      - name: favorecido_nome
        description: "Nome ou razão social do favorecido."
      - name: valor_celula
        description: "Valor financeiro consolidado da transação."
      - name: dt_ingest
        description: "Timestamp da ingestão dos dados (UTC-3)."
      - name: programa_governo
        description: "Código identificador do programa de governo."
      - name: programa_governo_descricao
        description: "Descrição detalhada do programa de governo."
      - name: acao_governo
        description: "Código da ação orçamentária."
      - name: acao_governo_descricao
        description: "Descrição da ação orçamentária."
      - name: nc_evento
        description: "Código do evento contábil."
      - name: nc_evento_descricao
        description: "Descrição do evento contábil."
      - name: nc_natureza_despesa
        description: "Código da natureza de despesa."
      - name: nc_natureza_despesa_descricao
        description: "Descrição da natureza de despesa."
      - name: nc_plano_interno_descricao2
        description: "Segunda descrição detalhada do Plano Interno."
      - name: favorecido_municipio
        description: "Código do município do favorecido."
      - name: favorecido_municipio_descricao
        description: "Nome do município do favorecido."
      - name: movimento_liquido_moeda_origem
        description: "Valor do movimento líquido na moeda de origem."
      - name: emissao_dia
        description: "Dia da emissão da nota de crédito."
      - name: emissao_mes
        description: "Mês de emissão da nota de crédito."
      - name: emissao_ano
        description: "Ano de emissão da nota de crédito."
      - name: dc
        description: "Indicador de Débito ou Crédito (D/C)."
      - name: emitente_codigo
        description: "Código da Unidade Gestora emitente."
      - name: emitente_nome
        description: "Nome da Unidade Gestora emitente."
      - name: gnd_codigo
        description: "Código do Grupo de Natureza de Despesa."
      - name: gnd_nome
        description: "Nome do Grupo de Natureza de Despesa."
      - name: descricao
        description: "Descrição geral do documento."
      - name: tipo_nc
        description: "Classificação do tipo de Nota de Crédito."
      - name: nc_item_detalhamento
        description: "Detalhamento dos itens contidos na NC."
      - name: ro
        description: "Registro de Operação associado."
      - name: item_total
        description: "Valor total do item."
      - name: total_lista
        description: "Valor total da lista de itens."
      - name: esfera_orcamentaria_codigo
        description: "Código da esfera orçamentária."
      - name: esfera_orcamentaria_nome
        description: "Nome da esfera orçamentária."

    tests:
      - verificacao_tipagem:
          nome_tabela: 'siafi.nc_tesouro_mir'
          nome_coluna: 'ne_ccor_ano_emissao'
          tipo_esperado: 'integer'
      - verificacao_tipagem:
          nome_tabela: 'siafi.nc_tesouro_mir'
          nome_coluna: 'despesas_empenhadas'
          tipo_esperado: 'numeric'
      - verificacao_tipagem:
          nome_tabela: 'siafi.nc_tesouro_mir'
          nome_coluna: 'despesas_pagas'
          tipo_esperado: 'numeric'

  - name: pf_tesouro
    description: >
      Modelo da camada bronze para programacoes financeiras do Tesouro (PF),
      com padronizacao basica de tipos, conversao do valor financeiro para numeric(15,2)
      e ajuste de timestamp de ingestao para UTC-3.
    meta:
      tags:
        - bronze
    columns:
      - name: emissao_mes
        description: "Mes de emissao da programacao financeira."
      - name: emissao_dia
        description: "Data de emissao da programacao financeira."
      - name: ug_emitente
        description: "Codigo da UG emitente."
      - name: ug_emitente_descricao
        description: "Descricao da UG emitente."
      - name: ug_favorecido
        description: "Codigo da UG favorecida."
      - name: ug_favorecido_descricao
        description: "Descricao da UG favorecida."
      - name: pf_evento
        description: "Codigo do evento da PF."
      - name: pf_evento_descricao
        description: "Descricao do evento da PF."
      - name: pf
        description: "Identificador da programacao financeira."
      - name: pf_inscricao
        description: "Numero de inscricao associado a PF (ex.: TED)."
      - name: pf_acao
        description: "Codigo da acao registrada na PF."
      - name: pf_acao_descricao
        description: "Descricao da acao registrada na PF."
      - name: pf_fonte_recursos
        description: "Codigo da fonte de recursos da PF."
      - name: pf_fonte_recursos_descricao
        description: "Descricao da fonte de recursos da PF."
      - name: doc_observacao
        description: "Observacao textual do documento."
      - name: pf_valor_linha
        description: "Valor financeiro da linha, convertido para numeric(15,2)."
      - name: dt_ingest
        description: "Timestamp de ingestao ajustado para UTC-3."

    tests:
      - verificacao_tipagem:
          nome_tabela: 'siafi_dbt.pf_tesouro_mir'
          nome_coluna: 'emissao_dia'
          tipo_esperado: 'date'
      - verificacao_tipagem:
          nome_tabela: 'siafi_dbt.pf_tesouro_mir'
          nome_coluna: 'pf_valor_linha'
          tipo_esperado: 'numeric'

  - name: pf_ptres
    description: >
      Modelo da camada bronze para a programacao de acao por PTRES (SIAFI),
      com padronizacao de tipos textuais e conversao dos campos de dotacao
      para numeric(15,2), mantendo timestamp de ingestao em UTC-3.
    meta:
      tags:
        - bronze
    columns:
      - name: programa_governo
        description: "Codigo do programa de governo."
      - name: programa_governo_descricao
        description: "Descricao do programa de governo."
      - name: plano_orcamentario
        description: "Codigo do plano orcamentario."
      - name: plano_orcamentario_descricao_1
        description: "Descricao 1 do plano orcamentario."
      - name: plano_orcamentario_descricao_2
        description: "Descricao 2 do plano orcamentario."
      - name: plano_orcamentario_descricao_3
        description: "Descricao 3 do plano orcamentario."
      - name: plano_orcamentario_descricao_4
        description: "Descricao 4 do plano orcamentario."
      - name: plano_orcamentario_descricao_5
        description: "Descricao 5 do plano orcamentario."
      - name: plano_orcamentario_descricao_6
        description: "Descricao 6 do plano orcamentario."
      - name: acao_governo
        description: "Codigo da acao de governo."
      - name: acao_governo_descricao
        description: "Descricao da acao de governo."
      - name: ptres
        description: "Codigo PTRES associado a programacao."
      - name: natureza_despesa
        description: "Codigo da natureza de despesa."
      - name: natureza_despesa_descricao
        description: "Descricao da natureza de despesa."
      - name: dotacao_inicial
        description: "Valor da dotacao inicial convertido para numeric(15,2)."
      - name: dotacao_suplementar
        description: "Valor da dotacao suplementar convertido para numeric(15,2)."
      - name: dotacao_atualizada
        description: "Valor da dotacao atualizada convertido para numeric(15,2)."
      - name: dt_ingest
        description: "Timestamp de ingestao ajustado para UTC-3."

    tests:
      - verificacao_tipagem:
          nome_tabela: 'siafi_dbt.pf_ptres_mir'
          nome_coluna: 'dotacao_inicial'
          tipo_esperado: 'numeric'
      - verificacao_tipagem:
          nome_tabela: 'siafi_dbt.pf_ptres_mir'
          nome_coluna: 'dotacao_atualizada'
          tipo_esperado: 'numeric'

  - name: pf_transfere
    description: >
      Modelo da camada bronze para programacao financeira do Transferegov,
      com padronizacao de tipos de identificadores e campos textuais,
      alem do ajuste de dt_ingest para timestamp com fuso UTC-3.
    meta:
      tags:
        - bronze
    columns:
      - name: id_programacao
        description: "Identificador da programacao financeira."
      - name: id_plano_acao
        description: "Identificador do plano de acao no Transferegov."
      - name: tp_pf_tipo_programacao
        description: "Tipo da programacao financeira (ex.: T)."
      - name: tx_minuta_programacao
        description: "Identificador da minuta/programacao (formato MPF)."
      - name: tx_numero_programacao
        description: "Numero da programacao financeira."
      - name: tx_situacao_programacao
        description: "Situacao da programacao financeira."
      - name: tx_observacao_programacao
        description: "Descricao textual/observacao da programacao."
      - name: ug_emitente_programacao
        description: "Codigo da UG emitente da programacao."
      - name: ug_favorecida_programacao
        description: "Codigo da UG favorecida da programacao."
      - name: dh_recebimento_programacao
        description: "Timestamp de recebimento/cadastro da programacao no sistema de origem."
      - name: dt_ingest
        description: "Timestamp de ingestao ajustado para UTC-3."

    tests:
      - verificacao_tipagem:
          nome_tabela: 'siafi_dbt.pf_transfere_mir'
          nome_coluna: 'id_plano_acao'
          tipo_esperado: 'integer'
      - verificacao_tipagem:
          nome_tabela: 'siafi_dbt.pf_transfere_mir'
          nome_coluna: 'id_programacao'
          tipo_esperado: 'integer'