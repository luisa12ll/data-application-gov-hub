version: 2

models:
  - name: pf_unificado
    description: >
      Tabela silver que unifica as programacoes financeiras do Tesouro Gerencial
      (pf_tesouro) e do Transferegov (pf_transfere), realizando o cruzamento pela
      chave normalizada da PF. A chave e formada pelos ultimos 12 caracteres do campo
      pf no Tesouro e comparada com tx_numero_programacao no Transferegov.
    meta:
      tags:
        - silver
    columns:
      - name: emissao_mes
        description: "Mes de emissao da programacao financeira no Tesouro."
      - name: emissao_dia
        description: "Data de emissao da programacao financeira no Tesouro."
      - name: ug_emitente
        description: "Codigo da UG emitente no Tesouro Gerencial."
      - name: ug_emitente_descricao
        description: "Descricao da UG emitente no Tesouro Gerencial."
      - name: ug_favorecido
        description: "Codigo da UG favorecida no Tesouro Gerencial."
      - name: ug_favorecido_descricao
        description: "Descricao da UG favorecida no Tesouro Gerencial."
      - name: pf_evento
        description: "Codigo do evento da programacao financeira no Tesouro."
      - name: pf_evento_descricao
        description: "Descricao do evento da programacao financeira no Tesouro."
      - name: pf
        description: "Identificador completo da PF no Tesouro Gerencial."
      - name: pf_inscricao
        description: "Inscricao/numero associado a PF no Tesouro."
      - name: pf_acao
        description: "Codigo da acao vinculada a PF no Tesouro."
      - name: pf_acao_descricao
        description: "Descricao da acao vinculada a PF no Tesouro."
      - name: pf_fonte_recursos
        description: "Codigo da fonte de recursos da PF no Tesouro."
      - name: pf_fonte_recursos_descricao
        description: "Descricao da fonte de recursos da PF no Tesouro."
      - name: doc_observacao
        description: "Observacao textual do documento no Tesouro."
      - name: pf_valor_linha
        description: "Valor financeiro da linha da PF no Tesouro."
      - name: id_programacao
        description: "Identificador da programacao financeira no Transferegov."
      - name: id_plano_acao
        description: "Identificador do plano de acao no Transferegov."
      - name: tp_pf_tipo_programacao
        description: "Tipo da programacao financeira no Transferegov."
      - name: tx_minuta_programacao
        description: "Numero/texto da minuta de programacao no Transferegov."
      - name: tx_numero_programacao
        description: "Numero da programacao financeira no Transferegov."
      - name: tx_situacao_programacao
        description: "Situacao da programacao financeira no Transferegov."
      - name: tx_observacao_programacao
        description: "Observacao/objeto da programacao no Transferegov."
      - name: ug_emitente_programacao
        description: "Codigo da UG emitente da programacao no Transferegov."
      - name: ug_favorecida_programacao
        description: "Codigo da UG favorecida da programacao no Transferegov."
      - name: dh_recebimento_programacao
        description: "Timestamp de recebimento/cadastro da programacao no Transferegov."
      - name: pf_chave
        description: "Chave normalizada usada no join entre Tesouro e Transferegov."
      - name: dt_ingest
        description: "Maior timestamp de ingestao entre as fontes (UTC-3)."
    tests:
      - verificacao_tipagem:
          nome_tabela: 'siafi_dbt.pf_unificado'
          nome_coluna: 'emissao_dia'
          tipo_esperado: 'date'
      - verificacao_tipagem:
          nome_tabela: 'siafi_dbt.pf_unificado'
          nome_coluna: 'pf_valor_linha'
          tipo_esperado: 'numeric'
      - verificacao_tipagem:
          nome_tabela: 'siafi_dbt.pf_unificado'
          nome_coluna: 'id_programacao'
          tipo_esperado: 'integer'
      - verificacao_tipagem:
          nome_tabela: 'siafi_dbt.pf_unificado'
          nome_coluna: 'id_plano_acao'
          tipo_esperado: 'integer'

  - name: pf_unificado_planos_acao
    description: >
      Tabela silver que enriquece a base pf_unificado com os dados de planos de acao
      do Transferegov, por meio do id_plano_acao. O cruzamento preserva todas as
      linhas de PF e deduplica planos de acao por id_plano_acao, mantendo o registro
      mais recente por dt_ingest.
    meta:
      tags:
        - silver
    columns:
      - name: id_programacao
        description: "Identificador da programacao financeira no Transferegov."
      - name: id_plano_acao
        description: "Identificador do plano de acao usado como chave de cruzamento."
      - name: id_programa
        description: "Identificador do programa associado ao plano de acao."
      - name: pf
        description: "Identificador completo da programacao financeira no Tesouro."
      - name: tx_numero_programacao
        description: "Numero da programacao financeira no Transferegov."
      - name: tx_situacao_plano_acao
        description: "Situacao do plano de acao no Transferegov."
      - name: vl_total_plano_acao
        description: "Valor total informado para o plano de acao."
      - name: dt_ingest
        description: "Maior timestamp de ingestao entre pf_unificado e planos_acao_ted."
    tests:
      - verificacao_tipagem:
          nome_tabela: 'siafi_dbt.pf_unificado_planos_acao'
          nome_coluna: 'id_programacao'
          tipo_esperado: 'integer'
      - verificacao_tipagem:
          nome_tabela: 'siafi_dbt.pf_unificado_planos_acao'
          nome_coluna: 'id_plano_acao'
          tipo_esperado: 'integer'
      - verificacao_tipagem:
          nome_tabela: 'siafi_dbt.pf_unificado_planos_acao'
          nome_coluna: 'id_programa'
          tipo_esperado: 'integer'
      - verificacao_tipagem:
          nome_tabela: 'siafi_dbt.pf_unificado_planos_acao'
          nome_coluna: 'vl_total_plano_acao'
          tipo_esperado: 'numeric'
          
  - name: nc_unificado
    description: >
      Tabela silver que parte da nc_tesouro_mir e enriquece os campos de programa e ação
      com mapeamento por PTRES (programa_por_ptres/pf_ptres).
      O modelo mantém o layout principal de NC do SIAFI e aplica COALESCE para preencher
      programa_governo, programa_governo_descricao, acao_governo e acao_governo_descricao
      quando estiverem ausentes na base original.
    meta:
      tags:
        - silver
    columns:
      - name: programa_governo
        description: "Código do programa de governo (SIAFI com fallback do mapeamento por PTRES)."
      - name: programa_governo_descricao
        description: "Descrição do programa de governo (SIAFI com fallback do mapeamento por PTRES)."
      - name: acao_governo
        description: "Código da ação de governo (SIAFI com fallback do mapeamento por PTRES)."
      - name: acao_governo_descricao
        description: "Descrição da ação de governo (SIAFI com fallback do mapeamento por PTRES)."
      - name: nc
        description: "Número identificador da Nota de Crédito (NC)."
      - name: nc_transferencia
        description: "Número/identificador de transferência da NC."
      - name: nc_fonte_recursos
        description: "Código da fonte de recursos."
      - name: nc_fonte_recursos_descricao
        description: "Descrição da fonte de recursos."
      - name: ptres
        description: "Programa de Trabalho Resumido (PTRES) no SIAFI."
      - name: nc_evento_descricao
        description: "Descrição do evento (mapeada para Tipo NC na harmonização de layouts)."
      - name: nc_ug_responsavel
        description: "Código da UG responsável."
      - name: nc_ug_responsavel_descricao
        description: "Nome da UG responsável."
      - name: nc_natureza_despesa
        description: "Código da natureza de despesa."
      - name: nc_natureza_despesa_descricao
        description: "Descrição da natureza de despesa."
      - name: nc_plano_interno
        description: "Código do plano interno."
      - name: nc_plano_interno_descricao1
        description: "Descrição 1 do plano interno."
      - name: favorecido_doc
        description: "Documento (CPF/CNPJ) do favorecido."
      - name: favorecido_doc_descricao
        description: "Nome/razão social do favorecido."
      - name: favorecido_municipio
        description: "Código do município do favorecido."
      - name: favorecido_municipio_descricao
        description: "Descrição do município do favorecido."
      - name: valor_celula
        description: "Valor financeiro da célula/linha da NC no SIAFI."
      - name: movimento_liquido_moeda_origem
        description: "Movimento líquido na moeda de origem."
      - name: descricao
        description: "Descrição geral da NC (quando disponível)."
      - name: nc_plano_interno_descricao2
        description: "Descrição 2 do plano interno."
      - name: nc_evento
        description: "Código do evento contábil (quando disponível)."
      - name: nc_item_detalhamento
        description: "Detalhamento da NC (S/N), quando disponível."
      - name: emissao_dia
        description: "Data de emissão da Nota de Crédito (SIAFI, quando disponível)."
      - name: emissao_mes
        description: "Mês de emissão da Nota de Crédito (SIAFI, quando disponível)."
      - name: emissao_ano
        description: "Ano de emissão da Nota de Crédito (SIAFI, quando disponível)."
      - name: ro
        description: "Registro de operação associado."
      - name: dc
        description: "Indicador débito/crédito."
      - name: total_lista
        description: "Valor total da lista."
      - name: esfera_orcamentaria_codigo
        description: "Código da esfera orçamentária."
      - name: esfera_orcamentaria_nome
        description: "Nome da esfera orçamentária."
      - name: dt_ingest
        description: "Timestamp de ingestão do SIAFI (UTC-3)."
    tests:
      - verificacao_tipagem:
          nome_tabela: 'siafi_dbt.nc_unificado'
          nome_coluna: 'valor_celula'
          tipo_esperado: 'numeric'
      - verificacao_tipagem:
          nome_tabela: 'siafi_dbt.nc_unificado'
          nome_coluna: 'emissao_dia'
          tipo_esperado: 'date'
      - verificacao_tipagem:
          nome_tabela: 'siafi_dbt.nc_unificado'
          nome_coluna: 'dt_ingest'
          tipo_esperado: 'timestamp with time zone'
