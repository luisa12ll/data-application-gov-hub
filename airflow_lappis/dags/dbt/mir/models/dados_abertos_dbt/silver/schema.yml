version: 2

models:
  - name: parlamentares
    description: >
      Tabela silver que unifica informações de deputados e senadores
      em uma visão única de parlamentares, incluindo partido, UF,
      foto e logo do partido.
    meta:
      tags:
        - silver
    columns:
      - name: id_parlamentar
        description: >
          Identificador único do parlamentar na base unificada
          de deputados e senadores.
      - name: chave_join_nome
        description: >
          Chave de junção padronizada (nome em caixa alta e trimado),
          utilizada para relacionar parlamentares com outros modelos.
      - name: nome_parlamentar
        description: >
          Nome do parlamentar conforme registrado na base de origem.
      - name: cargo_parlamentar
        description: >
          Cargo do parlamentar (por exemplo, Deputado ou Senador).
      - name: sigla_partido
        description: >
          Sigla do partido ao qual o parlamentar está filiado.
      - name: uf_parlamentar
        description: >
          Sigla da Unidade Federativa (UF) que o parlamentar representa.
      - name: url_foto
        description: >
          URL da foto oficial do parlamentar na base de origem.
      - name: email
        description: >
          Endereço de e-mail institucional do parlamentar.
      - name: url_logo_partido
        description: >
          URL da imagem (logo) do partido do parlamentar,
          proveniente do seed partidos_logo.
    tests:
      - verificacao_tipagem:
          nome_tabela: 'dados_abertos.parlamentares'
          nome_coluna: 'id_parlamentar'
          tipo_esperado: 'integer'
      - verificacao_tipagem:
          nome_tabela: 'dados_abertos.parlamentares'
          nome_coluna: 'chave_join_nome'
          tipo_esperado: 'text'
      - verificacao_tipagem:
          nome_tabela: 'dados_abertos.parlamentares'
          nome_coluna: 'nome_parlamentar'
          tipo_esperado: 'text'
      - verificacao_tipagem:
          nome_tabela: 'dados_abertos.parlamentares'
          nome_coluna: 'cargo_parlamentar'
          tipo_esperado: 'text'
      - verificacao_tipagem:
          nome_tabela: 'dados_abertos.parlamentares'
          nome_coluna: 'sigla_partido'
          tipo_esperado: 'text'
      - verificacao_tipagem:
          nome_tabela: 'dados_abertos.parlamentares'
          nome_coluna: 'uf_parlamentar'
          tipo_esperado: 'text'
      - verificacao_tipagem:
          nome_tabela: 'dados_abertos.parlamentares'
          nome_coluna: 'url_foto'
          tipo_esperado: 'text'
      - verificacao_tipagem:
          nome_tabela: 'dados_abertos.parlamentares'
          nome_coluna: 'email'
          tipo_esperado: 'text'
      - verificacao_tipagem:
          nome_tabela: 'dados_abertos.parlamentares'
          nome_coluna: 'url_logo_partido'
          tipo_esperado: 'text'

  - name: parlamentares_historico
    description: >
      Tabela da camada silver que consolida e uniformiza o panorama evolutivo de deputados e senadores,
      fundindo as ocorrrências temporais (datas de filiação, desfiliação, cargo e status partidários).
    meta:
      tags:
        - silver
    columns:
      - name: id_parlamentar
        description: Identificador base unificado que representa o político (proveniente da Câmara ou Senado).
      - name: chave_join_nome
        description: Chave string de junção formatada em caixa alta e conversões 'unaccent' na rotina TRANSLATE projetada para merge rústico.
      - name: nome_parlamentar
        description: Nome extenso original proveniente da camada bronze agregada.
      - name: cargo_parlamentar
        description: Atribuição legal do período ('Deputado' ou 'Senador').
      - name: sigla_partido
        description: Partido representativo desta dimensão temporal do parlamentar com padronização via mapas canônicos.
      - name: uf_parlamentar
        description: Sigla da Unidade Federativa.
      - name: url_foto
        description: Endereço linkado contendo a foto oficial da sub-entidade.
      - name: email
        description: Endereço de e-mail de correspondência institucional.
      - name: data_filiacao
        description: Timestamp contendo o marco de data original do início deste ciclo institucional vigente ou pregresso.
      - name: data_desfiliacao
        description: Timestamp determinando interrupção real do vínculo computada por cálculos de encerramento da sub-plataforma.
      - name: id_legislatura
        description: Inteiro referenciando o ciclo se existente (normalmente preenchido por Deputados).
      - name: situacao
        description: Estado textual representativo do cargo (Afastado, Exercício, Licença).
      - name: fonte
        description: Tracking text de procedência do pipeline primário.
      - name: dt_ingest
        description: Ponto de captura original no tempo.
      - name: url_logo_partido
        description: URL resolvida da logomarca do partido associado pelo macro map de partis.

    tests:
      - verificacao_tipagem:
          nome_tabela: 'dados_abertos.parlamentares_historico'
          nome_coluna: 'id_parlamentar'
          tipo_esperado: 'integer'
      - verificacao_tipagem:
          nome_tabela: 'dados_abertos.parlamentares_historico'
          nome_coluna: 'chave_join_nome'
          tipo_esperado: 'text'
      - verificacao_tipagem:
          nome_tabela: 'dados_abertos.parlamentares_historico'
          nome_coluna: 'nome_parlamentar'
          tipo_esperado: 'text'
      - verificacao_tipagem:
          nome_tabela: 'dados_abertos.parlamentares_historico'
          nome_coluna: 'data_filiacao'
          tipo_esperado: 'timestamp with time zone'
      - verificacao_tipagem:
          nome_tabela: 'dados_abertos.parlamentares_historico'
          nome_coluna: 'data_desfiliacao'
          tipo_esperado: 'timestamp with time zone'
      - verificacao_tipagem:
          nome_tabela: 'dados_abertos.parlamentares_historico'
          nome_coluna: 'id_legislatura'
          tipo_esperado: 'integer'
