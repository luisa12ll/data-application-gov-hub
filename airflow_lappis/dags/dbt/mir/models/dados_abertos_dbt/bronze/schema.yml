version: 2

models:
  # Dados Abertos DBT

  ## Bronze
  - name: deputados
    description: >
      Tabela com informações básicas sobre deputados federais obtidas por meio da API de Dados Abertos da Câmara dos Deputados.
      Contém dados cadastrais e institucionais como identificador, nome parlamentar, partido, unidade federativa,
      legislatura e e-mail institucional.
      Esta tabela representa a camada bronze do pipeline, aplicando padronização de tipos,
      pequenas transformações e ajuste de fuso horário na data de ingestão.
      Os dados são provenientes da fonte dados_abertos.deputados (camada raw) e
      passam por conversão explícita de tipos para garantir consistência e rastreabilidade.
    meta:
      tags:
        - bronze
    columns:
      - name: id
        description: >
          Identificador único do deputado na API da Câmara.
          Utilizado como chave primária e referência para relacionamentos com outras tabelas.

      - name: nome
        description: >
          Nome parlamentar do deputado conforme registrado na Câmara dos Deputados.

      - name: siglapartido
        description: >
          Sigla do partido ao qual o deputado está filiado na legislatura informada.

      - name: siglauf
        description: >
          Sigla da Unidade Federativa (UF) que o deputado representa.

      - name: idlegislatura
        description: >
          Identificador numérico da legislatura à qual o deputado está vinculado.

      - name: urlfoto
        description: >
          URL da foto oficial do deputado disponibilizada pela Câmara dos Deputados.

      - name: email
        description: >
          Endereço de e-mail institucional do deputado na Câmara dos Deputados.

      - name: dt_ingest
        description: >
          Data e hora (UTC-3 Brasília) em que os dados foram ingeridos da fonte original para a camada raw.
    tests: 
    - verificacao_tipagem:
        nome_tabela: 'deputados.deputados'
        nome_coluna: 'id'
        tipo_esperado: 'integer'

    - verificacao_tipagem:
        nome_tabela: 'deputados.deputados'
        nome_coluna: 'nome'
        tipo_esperado: 'text'

    - verificacao_tipagem:
        nome_tabela: 'deputados.deputados'
        nome_coluna: 'siglapartido'
        tipo_esperado: 'text'

    - verificacao_tipagem:
        nome_tabela: 'deputados.deputados'
        nome_coluna: 'siglauf'
        tipo_esperado: 'text'

    - verificacao_tipagem:
        nome_tabela: 'deputados.deputados'
        nome_coluna: 'idlegislatura'
        tipo_esperado: 'integer'

    - verificacao_tipagem:
        nome_tabela: 'deputados'
        nome_coluna: 'urlfoto'
        tipo_esperado: 'text'
        
    - verificacao_tipagem:
        nome_tabela: 'deputados.deputados'
        nome_coluna: 'email'
        tipo_esperado: 'text'

    - verificacao_tipagem:
        nome_tabela: 'deputados.deputados'
        nome_coluna: 'dt_ingest'
        tipo_esperado: 'timestamp with time zone'

  - name: senadores
    description: >
      Tabela com informações básicas sobre senadores federais obtidas por meio da API de Dados Abertos do Senado Federal.
      Contém dados cadastrais e institucionais como identificador, nome parlamentar, sexo, forma de tratamento,
      partido, unidade federativa, URLs de foto e página, e e-mail institucional.
      Esta tabela representa a camada bronze do pipeline, aplicando padronização de tipos,
      pequenas transformações e ajuste de fuso horário na data de ingestão.
      Os dados são provenientes da fonte senado_federal.senadores (camada raw) e
      passam por conversão explícita de tipos para garantir consistência e rastreabilidade.
    meta:
      tags:
        - bronze
    columns:
      - name: id
        description: >
          Identificador único do senador na API do Senado Federal.
          Utilizado como chave primária e referência para relacionamentos com outras tabelas.

      - name: nome_parlamentar
        description: >
          Nome parlamentar do senador conforme registrado no Senado Federal.

      - name: sexo
        description: >
          Sexo do senador (Masculino ou Feminino).

      - name: forma_tratamento
        description: >
          Forma de tratamento do senador (ex: Senador, Senadora).

      - name: url_foto
        description: >
          URL da foto oficial do senador disponibilizada pelo Senado Federal.

      - name: url_pagina
        description: >
          URL da página de perfil do senador no portal do Senado Federal.

      - name: email
        description: >
          Endereço de e-mail institucional do senador no Senado Federal.

      - name: sigla_partido
        description: >
          Sigla do partido ao qual o senador está filiado.

      - name: uf
        description: >
          Sigla da Unidade Federativa (UF) que o senador representa.

      - name: dt_ingest
        description: >
          Data e hora (UTC-3 Brasília) em que os dados foram ingeridos da fonte original para a camada raw.

    tests: 
    - verificacao_tipagem:
        nome_tabela: 'senadores.senadores'
        nome_coluna: 'id'
        tipo_esperado: 'integer'

    - verificacao_tipagem:
        nome_tabela: 'senadores.senadores'
        nome_coluna: 'nome_parlamentar'
        tipo_esperado: 'text'

    - verificacao_tipagem:
        nome_tabela: 'senadores.senadores'
        nome_coluna: 'sexo'
        tipo_esperado: 'text'

    - verificacao_tipagem:
        nome_tabela: 'senadores.senadores'
        nome_coluna: 'forma_tratamento'
        tipo_esperado: 'text'

    - verificacao_tipagem:
        nome_tabela: 'senadores.senadores'
        nome_coluna: 'url_foto'
        tipo_esperado: 'text'

    - verificacao_tipagem:
        nome_tabela: 'senadores.senadores'
        nome_coluna: 'url_pagina'
        tipo_esperado: 'text'

    - verificacao_tipagem:
        nome_tabela: 'senadores.senadores'
        nome_coluna: 'email'
        tipo_esperado: 'text'

    - verificacao_tipagem:
        nome_tabela: 'senadores.senadores'
        nome_coluna: 'sigla_partido'
        tipo_esperado: 'text'

    - verificacao_tipagem:
        nome_tabela: 'senadores.senadores'
        nome_coluna: 'uf'
        tipo_esperado: 'text'

    - verificacao_tipagem:
        nome_tabela: 'senadores.senadores'
        nome_coluna: 'dt_ingest'
        tipo_esperado: 'timestamp with time zone'

  - name: legislaturas
    description: >
      Tabela com informações de legislaturas da Câmara dos Deputados, incluindo
      identificador, período de vigência e data de eleição.
      Esta tabela representa a camada bronze do pipeline, com padronização de tipos
      e ajuste de fuso horário na data de ingestão.
      Os dados são provenientes da fonte camara_deputados.legislaturas (camada raw) e
      passam por conversão explícita de tipos para garantir consistência e rastreabilidade.
    meta:
      tags:
        - bronze
    columns:
      - name: id
        description: >
          Identificador único da legislatura na API da Câmara dos Deputados.

      - name: data_inicio
        description: >
          Data de início da legislatura.

      - name: data_fim
        description: >
          Data de término da legislatura.

      - name: data_eleicao
        description: >
          Data da eleição associada à legislatura.

      - name: dt_ingest
        description: >
          Data e hora (UTC-3 Brasília) em que os dados foram ingeridos da fonte original para a camada raw.

    tests:
    - verificacao_tipagem:
        nome_tabela: 'legislaturas.legislaturas'
        nome_coluna: 'id'
        tipo_esperado: 'integer'

    - verificacao_tipagem:
        nome_tabela: 'legislaturas.legislaturas'
        nome_coluna: 'data_inicio'
        tipo_esperado: 'date'

    - verificacao_tipagem:
        nome_tabela: 'legislaturas.legislaturas'
        nome_coluna: 'data_fim'
        tipo_esperado: 'date'

    - verificacao_tipagem:
        nome_tabela: 'legislaturas.legislaturas'
        nome_coluna: 'data_eleicao'
        tipo_esperado: 'date'

    - verificacao_tipagem:
        nome_tabela: 'legislaturas.legislaturas'
        nome_coluna: 'dt_ingest'
        tipo_esperado: 'timestamp with time zone'


  - name: deputados_historico
    description: >
      Tabela contendo todo o detalhamento evolutivo (histórico temporal) dos deputados federais através
      da API da Câmara dos Deputados, incluindo trocas de mandatos, filiações, afastamentos e licenças,
      bem como o começo e final calculado exato de cada período.
    meta:
      tags:
        - bronze
    columns:
      - name: id
        description: Identificador do deputado na Câmara.
      - name: nome
        description: Nome oficial do deputado na API da Câmara.
      - name: sigla_partido
        description: Partido politico atrelado ao registro do histórico de filiação.
      - name: id_legislatura
        description: Código numérico referente a legislatura do evento histórico do deputado.
      - name: situacao
        description: Situação legal ou institucional durante aquele período (ex. Exercício, Afastado, Licença, etc).
      - name: data_filiacao
        description: A data em que o estado do período temporal foi iniciado. Baseado na data evento reportada da Câmara.
      - name: data_desfiliacao
        description: >
          A data fina de encerramento do vínculo/situação, derivado dinamicamente das
          ocorrências subsequentes e do fim oficial da legislatura.
      - name: dt_ingest
        description: Data de ingestão do registro advinda do raw.

    tests:
      - verificacao_tipagem:
          nome_tabela: 'dados_abertos.deputados_historico'
          nome_coluna: 'id'
          tipo_esperado: 'integer'
      - verificacao_tipagem:
          nome_tabela: 'dados_abertos.deputados_historico'
          nome_coluna: 'nome'
          tipo_esperado: 'text'
      - verificacao_tipagem:
          nome_tabela: 'dados_abertos.deputados_historico'
          nome_coluna: 'id_legislatura'
          tipo_esperado: 'integer'
      - verificacao_tipagem:
          nome_tabela: 'dados_abertos.deputados_historico'
          nome_coluna: 'situacao'
          tipo_esperado: 'text'
      - verificacao_tipagem:
          nome_tabela: 'dados_abertos.deputados_historico'
          nome_coluna: 'data_filiacao'
          tipo_esperado: 'timestamp with time zone'
      - verificacao_tipagem:
          nome_tabela: 'dados_abertos.deputados_historico'
          nome_coluna: 'data_desfiliacao'
          tipo_esperado: 'timestamp with time zone'

  - name: senadores_historico
    description: >
      Tabela que detalha a temporalidade histórica de todas as filiações e trânsitos institucionais
      recorrentes dos senadores federais pela API do Senado Federal.
    meta:
      tags:
        - bronze
    columns:
      - name: parlamentar_id
        description: Identificador base do senador.
      - name: codigo_partido
        description: Código associado com o registro partidário original do Senado.
      - name: sigla_partido
        description: Sigla partidária ao qual o legislador participava na época da filiação.
      - name: nome_partido
        description: Descritivo puro com o nome do partido atrelado a este registro historico.
      - name: nome
        description: Nome atrelado ao parlamentar nesta ocorrência temporal.
      - name: data_filiacao
        description: A data hora legal e literal em que a nova condição partidária foi assumida no senado.
      - name: data_desfiliação
        description: A data hora limítrofe oficial sinalizando que esse ciclo se acabou.
      - name: ano_filiacao
        description: Extração numérica do ano da vinculação que abriu o percurso.
      - name: ano_desfiliação
        description: Extração em inteiros do ano em que a ocorrência atingiu seu ponto derradeiro.
      - name: fonte
        description: Informação que aponta de qual engine o historico se baseia.
      - name: dt_ingest
        description: Timestamp padronizado indicando o horário de registro físico efetuado via job.

    tests:
      - verificacao_tipagem:
          nome_tabela: 'dados_abertos.senadores_historico'
          nome_coluna: 'parlamentar_id'
          tipo_esperado: 'integer'
      - verificacao_tipagem:
          nome_tabela: 'dados_abertos.senadores_historico'
          nome_coluna: 'data_filiacao'
          tipo_esperado: 'timestamp with time zone'
      - verificacao_tipagem:
          nome_tabela: 'dados_abertos.senadores_historico'
          nome_coluna: 'data_desfiliação'
          tipo_esperado: 'timestamp with time zone'
      - verificacao_tipagem:
          nome_tabela: 'dados_abertos.senadores_historico'
          nome_coluna: 'ano_filiacao'
          tipo_esperado: 'integer'
      - verificacao_tipagem:
          nome_tabela: 'dados_abertos.senadores_historico'
          nome_coluna: 'ano_desfiliação'
          tipo_esperado: 'integer'
