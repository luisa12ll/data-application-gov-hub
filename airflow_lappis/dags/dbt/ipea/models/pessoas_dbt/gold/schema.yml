version: 2

models:

  # Gold
  - name: aposentadorias_resumo
    description: >
      Tabela de resumo dos servidores aposentados, contendo informações detalhadas
      sobre a data de ingresso no serviço público, data de aposentadoria e tempo
      de serviço público calculado em anos, meses e dias. A granularidade da tabela
      é por CPF, ou seja, cada linha representa um servidor aposentado único.

    meta:
      tags:
        - gold
    columns:
      - name: cpf
        description: Número do CPF do servidor aposentado.
      - name: nome_pessoa
        description: Nome completo do servidor aposentado.
      - name: dt_ocorr_ingresso_serv_publico
        description: Data de ingresso do servidor no serviço público.
      - name: dt_ocorr_aposentadoria
        description: Data de aposentadoria do servidor.
      - name: mes_aposentadoria
        description: Mês da aposentadoria (arredondado para o primeiro dia do mês).
      - name: nome_situacao_funcional
        description: Situação funcional do servidor no momento da aposentadoria.
      - name: nome_ocorr_aposentadoria
        description: Tipo de ocorrência que levou à aposentadoria do servidor.
      - name: nome_cargo
        description: Cargo ocupado pelo servidor no momento da aposentadoria.
      - name: sigla_nivel_cargo
        description: Sigla do nível do cargo ocupado.
      - name: classe_padrao
        description: Classe e padrão do cargo, no formato "classe-padrão".
      - name: age
        description: Diferença completa entre as datas de ingresso e aposentadoria, em formato de intervalo.
      - name: diff_anos
        description: Quantidade de anos entre o ingresso no serviço público e a aposentadoria.
      - name: diff_meses
        description: Quantidade de meses entre o ingresso e a aposentadoria (ignora anos completos).
      - name: diff_dias
        description: Quantidade de dias entre o ingresso e a aposentadoria (ignora anos e meses completos).
      - name: dt_ingest
        description: >
          Data e hora (UTC-3 Brasília) mais recente de ingestão dos dados das tabelas fonte utilizadas neste modelo.



  - name: cargos_consolidado
    description: >
      Tabela que consolida informações de cargos ocupados e vagos no serviço público,
      a partir da junção entre os dados do SIAPE (servidores ativos e detalhados) e
      os dados do SIORG (estrutura de cargos disponíveis). Essa junção é feita com
      base no CPF do titular do cargo. Quando os campos do SIAPE estão nulos, o cargo
      provavelmente está vago. A tabela pode ser utilizada para identificar cargos
      vagos por unidade organizacional.

    meta:
      tags:
        - gold
    columns:
      - name: siorg_cod_unidade
        description: Código da unidade organizacional no SIORG.
      - name: siorg_nome_unidade
        description: Nome da unidade organizacional no SIORG.
      - name: siorg_sigla_unidade
        description: Sigla da unidade organizacional no SIORG.
      - name: siorg_municipio_unidade
        description: Município da unidade organizacional no SIORG.
      - name: siorg_uf_unidade
        description: Unidade federativa (UF) da unidade organizacional no SIORG.
      - name: siorg_denominacao_cargo
        description: Denominação do cargo conforme registrado no SIORG.
      - name: siorg_funcao
        description: Função comissionada associada ao cargo no SIORG.
      - name: siorg_cod_instancia_cargo
        description: Código da instância do cargo no SIORG.
      - name: siorg_cpf_titular
        description: CPF do titular do cargo segundo o SIORG.
      - name: siorg_nome_titular
        description: Nome do titular do cargo segundo o SIORG.

      - name: siape_cpf
        description: CPF do servidor conforme os dados do SIAPE.
      - name: siape_nome_pessoa
        description: Nome completo do servidor no SIAPE.
      - name: siape_nome_cargo_efetivo
        description: Nome do cargo efetivo ocupado pelo servidor no SIAPE.
      - name: siape_nome_funcao_comissionada
        description: Nome da função comissionada ocupada pelo servidor no SIAPE.
      - name: siape_cod_uorg
        description: Código da unidade de exercício do servidor no SIAPE.
      - name: siape_nome_uorg
        description: Nome da unidade de exercício do servidor no SIAPE.
      - name: siape_sigla_uorg
        description: Sigla da unidade de exercício do servidor no SIAPE.
      - name: siape_uf_uorg
        description: Unidade federativa (UF) da unidade de exercício no SIAPE.
      - name: siape_situacao_funcional
        description: Situação funcional atual do servidor segundo o SIAPE.
      - name: dt_ingest
        description: >
          Data e hora (UTC-3 Brasília) mais recente de ingestão dos dados das tabelas fonte utilizadas neste modelo.



  - name: hierarquia
    description: >
      Tabela que correlaciona dados do SIAPE (dados funcionais e pessoais dos servidores)
      com a estrutura organizacional do SIORG, atribuindo uma métrica de hierarquia aos cargos
      com base na codificação da função. A hierarquia é determinada por uma fórmula baseada
      na categoria e no nível do cargo. A tabela também indica se o cargo é de carreira ou de
      nomeação livre, além de consolidar informações sobre o servidor e sua chefia imediata.

    meta:
      tags:
        - gold
    columns:
      - name: codigo_siape
        description: Código da função no SIAPE.
      - name: codigo_siorg
        description: Código da função no SIORG, com espaços removidos.
      - name: codigo_combinacao_siape
        description: Código combinado derivado da função no SIAPE, usado para correlação.
      - name: codigo_combinacao_siorg
        description: Código combinado derivado da função no SIORG, usado para correlação.
      - name: matricula_siape
        description: Matrícula funcional do servidor no SIAPE.
      - name: cpf
        description: CPF do servidor.
      - name: cpf_chefia_imediata
        description: CPF da chefia imediata do servidor.
      - name: cod_situacao_funcional
        description: Código da situação funcional do servidor.
      - name: nome_situacao_funcional
        description: Descrição da situação funcional do servidor.
      - name: hierarquia_cargo
        description: Indicador numérico da hierarquia do cargo (quanto menor, maior o cargo).
      - name: servidor
        description: Nome do servidor ocupante do cargo.
      - name: dt_nascimento
        description: Data de nascimento do servidor.
      - name: nome_sexo
        description: Sexo do servidor.
      - name: nome_estado_civil
        description: Estado civil do servidor.
      - name: nome_nacionalidade
        description: Nacionalidade do servidor.
      - name: nome_cor
        description: Cor/raça do servidor.
      - name: uf_nascimento
        description: Unidade federativa de nascimento do servidor.
      - name: nome_municipio_nascimento
        description: Município de nascimento do servidor.
      - name: nome_chefia
        description: Nome da chefia imediata do servidor.
      - name: codigounidade
        description: Código da unidade organizacional associada ao cargo.
      - name: codigounidadepai
        description: Código da unidade organizacional pai (superior).
      - name: caminho_unidade
        description: Caminho hierárquico completo da unidade.
      - name: ordem_grandeza
        description: Nível hierárquico da unidade na estrutura organizacional.
      - name: nomeunidade
        description: Nome da unidade organizacional.
      - name: siglaunidade
        description: Sigla da unidade organizacional.
      - name: nome_cargo
        description: Nome ou denominação do cargo ocupado.
      - name: servidores_carreira
        description: Indica se o servidor está em cargo de carreira ou em nomeação livre.
      - name: pdg
        description: Modalidade de participação do servidor no PGD, com valores padronizados para análise.
      - name: unidade_exercicio
        description: Unidade de exercício tratada para exibição nas análises de hierarquia.
      - name: nome_municipio_uorg
        description: Município da unidade organizacional associado à sigla da unidade.
      - name: cod_escolaridade_principal
        description: Código da principal escolaridade cadastrada para o servidor.
      - name: nome_escolaridade_principal
        description: Nome da principal escolaridade cadastrada para o servidor.
      - name: nome_deficiencia_fisica
        description: Descrição da deficiência física cadastrada para o servidor, quando houver.
      - name: nome_cargo_emprego
        description: Nome do cargo ou emprego do servidor conforme dados detalhados.
      - name: dt_ingest
        description: >
          Data e hora (UTC-3 Brasília) mais recente de ingestão dos dados das tabelas fonte utilizadas neste modelo.


  - name: resumo_quadro_pessoal
    description: >
      Tabela resumo com a distribuição dos servidores públicos por cargo efetivo, gênero,
      situação funcional e unidade federativa da unidade de exercício (UF). A granularidade é agregada,
      e cada linha representa uma combinação única desses atributos, com a respectiva contagem de servidores.

    meta:
      tags:
        - gold
    columns:
      - name: cargo_efetivo
        description: >
          Nome do cargo efetivo ocupado pelo servidor. Caso não informado, é preenchido com 'N/A'.
      - name: genero
        description: >
          Gênero do servidor (masculino, feminino ou outro), conforme informado no cadastro pessoal.
          Em casos de ausência de informação, é preenchido com 'N/A'.
      - name: situacao_funcional
        description: >
          Situação funcional atual do servidor ( Ativo, Aposentado, Cedido, etc).
          Valores ausentes são substituídos por 'N/A'.
      - name: localidade_uf
        description: >
          Unidade Federativa (UF) da unidade organizacional onde o servidor exerce suas funções.
          Valores ausentes são preenchidos com 'N/A'.
      - name: quantidade_servidores
        description: >
          Quantidade total de servidores distintos (com base no CPF) que se enquadram na combinação dos atributos anteriores.
      - name: dt_ingest
        description: >
          Data e hora (UTC-3 Brasília) mais recente de ingestão dos dados das tabelas fonte utilizadas neste modelo.


  - name: distribuicao_genero
    description: >
      Tabela agregada que apresenta a distribuição percentual de servidores por gênero,
      enriquecida com informações de modalidade PGD, escolaridade e deficiência física.
      A análise considera apenas servidores ativos com dados completos nas bases do SIAPE,
      SIORG e dados de uorg. A granularidade é por gênero, com cálculo de percentual em relação ao total.

    meta:
      tags:
        - gold
    columns:
      - name: genero
        description: Gênero do servidor (masculino, feminino, etc.) conforme cadastrado nos dados pessoais.
      - name: quantidade_servidores
        description: Quantidade total de servidores pertencentes a este gênero.
      - name: percentual_distribuicao
        description: >
          Percentual de servidores deste gênero em relação ao total de servidores,
          calculado como COUNT(*) * 1.0 / SUM(COUNT(*)) OVER ().
      - name: dt_ingest
        description: >
          Data e hora (UTC-3 Brasília) mais recente de ingestão dos dados das tabelas fonte utilizadas neste modelo.


  - name: distribuicao_raca_cor
    description: >
      Tabela agregada que apresenta a distribuição de servidores por raça/cor,
      enriquecida com informações de modalidade PGD, escolaridade e deficiência física.
      A análise considera apenas servidores ativos com dados completos nas bases do SIAPE,
      SIORG e dados de uorg. A granularidade é por raça/cor, ordenada pela quantidade de servidores.

    meta:
      tags:
        - gold
    columns:
      - name: cor_raca
        description: >
          Cor ou raça do servidor (branca, parda, preta, amarela, indígena, não informada)
          conforme autodeclaração registrada nos dados pessoais do SIAPE.
      - name: quantidade_servidores
        description: Quantidade total de servidores que se autodeclararam desta cor/raça.
      - name: dt_ingest
        description: >
          Data e hora (UTC-3 Brasília) mais recente de ingestão dos dados das tabelas fonte utilizadas neste modelo.


  - name: distribuicao_situacao_funcional
    description: >
      Tabela agregada que apresenta a distribuição de servidores por situação funcional,
      categorizando e padronizando as diferentes situações registradas no SIAPE.
      As situações funcionais são normalizadas em categorias como Ativo permanente, Cedido,
      Requisitado, Aposentado, Pensionista, Cargo comissionado e Estagiário.
      A análise inclui dados enriquecidos com informações de modalidade PGD e unidade organizacional.

    meta:
      tags:
        - gold
    columns:
      - name: situacao_funcional
        description: >
          Situação funcional normalizada do servidor (Ativo permanente, Cedido, Requisitado,
          Aposentado, Pensionista, Cargo comissionado, Estagiário), derivada do campo
          nome_situacao_funcional através de regras de categorização.
      - name: situacao_funcional_original
        description: >
          Nome original da situação funcional conforme registrado no SIAPE, antes da normalização
          (ATIVO PERMANENTE, ATIVO EM OUTRO ORGAO, APOSENTADO, etc.).
      - name: quantidade_servidores
        description: Quantidade total de servidores que se enquadram nesta combinação de situação funcional.
      - name: dt_ingest
        description: >
          Data e hora (UTC-3 Brasília) mais recente de ingestão dos dados das tabelas fonte utilizadas neste modelo.


  - name: kpis_servidores
    description: >
      Tabela de KPIs (Key Performance Indicators) consolidados sobre o quadro de pessoal,
      incluindo métricas de contagem total de servidores, servidores ativos permanentes,
      aposentados, estagiários e terceirizados. Esta tabela fornece uma visão rápida e consolidada
      dos principais indicadores quantitativos de recursos humanos da organização.
      Cada linha representa um KPI específico com seu respectivo valor.

    meta:
      tags:
        - gold
        - kpi
    columns:
      - name: kpi
        description: >
          Nome do indicador (total_servidores, servidores_ativos_permanentes, aposentados,
          estagiarios, terceirizados).
      - name: valor
        description: >
          Valor numérico do KPI, representando a contagem de CPFs ou IDs únicos conforme a métrica.
      - name: dt_ingest
        description: >
          Data e hora (UTC-3 Brasília) mais recente de ingestão dos dados das tabelas fonte utilizadas neste modelo.


  - name: distribuicao_mapa_uf
    description: >
      Tabela com a distribuição geográfica completa de servidores por Unidade Federativa (UF).
      Retorna todos os 27 estados brasileiros com suas respectivas contagens de servidores
      e percentuais. Estados sem servidores aparecem com valor 0. Útil para visualizações
      em mapas e análises de distribuição geográfica do quadro de pessoal.

    meta:
      tags:
        - gold
        - dashboard
    columns:
      - name: sigla_uf
        description: Sigla da Unidade Federativa (AC, AL, AM, AP, BA, CE, DF, ES, GO, MA, MG, MS, MT, PA, PB, PE, PI, PR, RJ, RN, RO, RR, RS, SC, SE, SP, TO).
      - name: nome_uf
        description: Nome completo da Unidade Federativa em maiúsculas.
      - name: valor
        description: Quantidade total de servidores com unidade de exercício neste estado.
      - name: percentual
        description: Percentual de servidores deste estado em relação ao total, formatado como string com símbolo '%'.
      - name: dt_ingest
        description: >
          Data e hora (UTC-3 Brasília) mais recente de ingestão dos dados das tabelas fonte utilizadas neste modelo.


  - name: tabela_servidores_agregada
    description: >
      Tabela agregada de servidores com informações consolidadas por cargo, gênero,
      situação funcional e localização (cidade/estado). Cada linha representa uma
      combinação única desses atributos com a respectiva contagem de servidores.
      Útil para análises detalhadas e exibição em tabelas de dashboard.

    meta:
      tags:
        - gold
        - dashboard
    columns:
      - name: cargo
        description: Nome do cargo ocupado pelo servidor.
      - name: genero
        description: Gênero do servidor normalizado (Masculino, Feminino).
      - name: situacao
        description: Situação funcional normalizada (Ativo Permanente, Aposentado, Ativo em outro órgão, Estagiário, Cedido/Requisitado).
      - name: cidade
        description: Nome do município da unidade de exercício formatado em título (primeira letra maiúscula).
      - name: estado
        description: Sigla da UF da unidade de exercício em maiúsculas.
      - name: total
        description: Quantidade total de servidores únicos (CPF) nesta combinação de atributos.
      - name: dt_ingest
        description: >
          Data e hora (UTC-3 Brasília) mais recente de ingestão dos dados das tabelas fonte utilizadas neste modelo.

  - name: distribuicao_raca_cor_sexo
    description: >
      Tabela agregada que apresenta a distribuição de servidores por raça/cor e sexo.
      A análise utiliza dados da tabela de hierarquia para calcular a quantidade de servidores
      por gênero em cada categoria de raça/cor e situação funcional.
      O campo 'feminino' é multiplicado por -1 para facilitar visualizações em pirâmide.
    meta:
      tags:
        - gold
    columns:
      - name: nome_cor
        description: Cor ou raça do servidor conforme autodeclaração.
      - name: feminino
        description: Quantidade de servidores do sexo feminino (valor negativo).
      - name: masculino
        description: Quantidade de servidores do sexo masculino.
      - name: nome_situacao_funcional
        description: Descrição da situação funcional do servidor.
      - name: dt_ingest
        description: >
          Data e hora (UTC-3 Brasília) mais recente de ingestão dos dados das tabelas fonte utilizadas neste modelo.
